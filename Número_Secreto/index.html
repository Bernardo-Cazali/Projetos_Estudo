<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Número Secreto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🔢 Número Secreto</h1>
        <p class="instrucoes">Tente adivinhar o número secreto entre 1 e 100</p>

        <div class="palpite-box">
            <input type="number" id="inputPalpite" min="1" max="100" placeholder="0">
            <button id="btnChutar">Chutar</button>
        </div>

        <div class="mensagem-box">
            <p id="mensagemRecorde">Melhor Pontuação: --</p>
            <p id="mensagemFeedback">Boa sorte! Faça o seu primeiro chute.</p>
            <p id="mensagemTentativas">Tentativas: 0</p>
        </div>

        <button id="btnReiniciar" class="escondido">Jogar Novamente 🔄</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
